apiVersion: v1
kind: Secret
metadata:
  name: formflow-backend-secrets
  namespace: formflow
type: Opaque
stringData:
  # Copy this file to a local-only manifest or create the secret with kubectl.
  # Do not commit real values to git.
  DATABASE_URL: "postgresql://<db-user>:<db-password>@<db-host>:5432/<db-name>?schema=public"
  REDIS_URL: "redis://<redis-host>:6379"
  JWT_ACCESS_SECRET: "<generate-a-long-random-secret>"
