name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://formflow:formflow@localhost:5432/formflow?schema=public"
      REDIS_URL: "redis://localhost:6379"
      JWT_ACCESS_SECRET: "ci-jwt-secret"
      JWT_ACCESS_TTL_SECONDS: "900"
      INTERNAL_JOB_SECRET: "ci-job-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run test:cov --if-present -- --runInBand
      - run: npm run test:e2e --if-present -- --runInBand
      - run: npm run build --if-present
